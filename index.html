<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoreAxis One</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"><\/script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--accent:#6366F1;--bg:#F8FAFC;--surface:#fff;--border:#E2E8F0;--text:#0F172A;--muted:#64748B;--success:#10B981;--warning:#F59E0B;--danger:#EF4444;--sidebar-w:240px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0F172A,#1E293B,#0F172A)}
.auth-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:48px;width:420px;backdrop-filter:blur(20px)}
.logo-mark{display:flex;align-items:center;gap:12px;margin-bottom:40px}
.logo-icon{width:44px;height:44px;background:linear-gradient(135deg,#6366F1,#06B6D4);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;color:#fff;font-size:18px}
.logo-text{font-family:'Syne',sans-serif;font-weight:700;font-size:20px;color:#fff}
.logo-text span{color:#6366F1}
.auth-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;color:#fff;margin-bottom:8px}
.auth-sub{color:rgba(255,255,255,.5);font-size:14px;margin-bottom:32px}
.auth-input{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:14px 16px;color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;margin-bottom:12px;outline:none}
.auth-input:focus{border-color:#6366F1}
.auth-input::placeholder{color:rgba(255,255,255,.3)}
.auth-btn{width:100%;background:linear-gradient(135deg,#6366F1,#4F46E5);border:none;border-radius:12px;padding:14px;color:#fff;font-family:'Syne',sans-serif;font-weight:600;font-size:15px;cursor:pointer;margin-top:8px}
.auth-toggle{text-align:center;margin-top:20px;color:rgba(255,255,255,.4);font-size:13px}
.auth-toggle a{color:#6366F1;cursor:pointer;text-decoration:none;font-weight:500}
.auth-error{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:10px 14px;color:#FCA5A5;font-size:13px;margin-bottom:12px;display:none}
#app-screen{display:none;min-height:100vh}
.layout{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);background:#0F172A;display:flex;flex-direction:column;position:fixed;height:100vh;left:0;top:0;z-index:100;overflow-y:auto}
.sidebar-logo{padding:20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.sidebar-logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#6366F1,#06B6D4);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;color:#fff;font-size:14px;flex-shrink:0}
.sidebar-logo-text{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:#fff}
.sidebar-logo-text span{color:#6366F1}
.sidebar-nav{flex:1;padding:12px;overflow-y:auto}
.nav-label{font-size:10px;font-weight:500;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:1.2px;padding:0 8px;margin:12px 0 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;cursor:pointer;transition:background .15s;margin-bottom:1px;color:rgba(255,255,255,.55);font-size:13px;user-select:none}
.nav-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85)}
.nav-item.active{background:rgba(99,102,241,.2);color:#A5B4FC}
.nav-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.sidebar-footer{padding:12px;border-top:1px solid rgba(255,255,255,.06);flex-shrink:0}
.user-pill{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;background:rgba(255,255,255,.05)}
.user-avatar{width:32px;height:32px;background:linear-gradient(135deg,#6366F1,#06B6D4);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-size:13px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:11px;color:rgba(255,255,255,.35)}
.logout-btn{background:none;border:none;color:rgba(255,255,255,.3);cursor:pointer;font-size:16px;padding:4px}
.logout-btn:hover{color:#EF4444}
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.page-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:600}
.topbar-right{display:flex;align-items:center;gap:10px}
.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:9px;padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-primary:hover{background:#4F46E5}
.btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:9px;padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-success{background:#10B981;color:#fff;border:none;border-radius:9px;padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-danger-sm{background:#FEE2E2;color:#991B1B;border:none;border-radius:7px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}
.content{padding:28px;flex:1}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stats-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.stats-grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:20px 22px}
.stat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:12px}
.stat-label{font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-value{font-family:'Syne',sans-serif;font-size:26px;font-weight:700}
.stat-sub{font-size:12px;color:var(--success);margin-top:4px}
.widgets-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px}
.widget{background:#fff;border:1px solid var(--border);border-radius:16px;padding:24px}
.widget-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:600;margin-bottom:16px}
.table-wrap{background:#fff;border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:20px}
.table-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px}
.table-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:600}
.table-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
table{width:100%;border-collapse:collapse}
th{background:#F8FAFC;padding:10px 16px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
td{padding:12px 16px;font-size:13px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFAFA}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.bg-green{background:#D1FAE5;color:#065F46}
.bg-blue{background:#DBEAFE;color:#1E40AF}
.bg-amber{background:#FEF3C7;color:#92400E}
.bg-red{background:#FEE2E2;color:#991B1B}
.bg-purple{background:#EDE9FE;color:#5B21B6}
.bg-gray{background:#F1F5F9;color:#475569}
.bg-cyan{background:#CFFAFE;color:#155E75}
.bg-orange{background:#FFEDD5;color:#9A3412}
.module-page{display:none}
.module-page.active{display:block}
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-card{background:#fff;border-radius:20px;padding:32px;width:520px;max-height:90vh;overflow-y:auto;position:relative}
.modal-card.wide{width:680px}
.modal-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:24px}
.form-group{margin-bottom:14px}
.form-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:5px}
.form-control{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;background:#fff}
.form-control:focus{border-color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.form-actions{display:flex;gap:10px;margin-top:24px;justify-content:flex-end}
.btn-cancel{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 20px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-save{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
.close-btn{position:absolute;top:20px;right:20px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted)}
.search-box{border:1px solid var(--border);border-radius:9px;padding:7px 12px;font-size:13px;outline:none;width:200px;color:var(--text);background:var(--bg)}
.kanban{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-top:8px}
.kanban-col{background:#F8FAFC;border-radius:12px;padding:12px}
.kanban-col-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.kanban-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}
.kanban-card-name{font-size:13px;font-weight:500;margin-bottom:4px}
.kanban-card-company{font-size:11px;color:var(--muted)}
.kanban-card-value{font-size:12px;font-weight:600;color:var(--accent);margin-top:6px}
.acct-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:24px}
.acct-card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:24px}
.acct-amount{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;margin:8px 0}
.activity-item{display:flex;gap:12px;margin-bottom:14px}
.activity-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.activity-text{font-size:13px;line-height:1.4}
.activity-time{font-size:11px;color:var(--muted);margin-top:2px}
.pipeline-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.pipeline-item:last-child{border-bottom:none}
.pipeline-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pipeline-name{flex:1;font-size:13px;font-weight:500}
.loading{text-align:center;padding:40px;color:var(--muted);font-size:14px}
.action-btn{background:none;border:none;cursor:pointer;font-size:13px;color:var(--accent);padding:4px 8px;border-radius:6px}
.action-btn:hover{background:#EEF2FF}
.delete-btn{color:var(--danger)}
.delete-btn:hover{background:#FEE2E2}
.success-btn{color:var(--success)}
.success-btn:hover{background:#D1FAE5}
/* Clock In/Out */
.clock-hero{background:linear-gradient(135deg,#0F172A,#1E293B);border-radius:20px;padding:36px;color:#fff;margin-bottom:24px;text-align:center}
.clock-time{font-family:'Syne',sans-serif;font-size:56px;font-weight:700;letter-spacing:2px;margin-bottom:8px}
.clock-date{font-size:14px;color:rgba(255,255,255,.5);margin-bottom:28px}
.clock-status{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);border-radius:30px;padding:8px 20px;font-size:14px;margin-bottom:28px}
.clock-status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.clock-btn{border:none;border-radius:16px;padding:16px 48px;font-family:'Syne',sans-serif;font-size:17px;font-weight:700;cursor:pointer;transition:all .2s}
.clock-in-btn{background:linear-gradient(135deg,#10B981,#059669);color:#fff}
.clock-out-btn{background:linear-gradient(135deg,#EF4444,#DC2626);color:#fff}
.clock-in-btn:hover{opacity:.9;transform:scale(1.02)}
.clock-out-btn:hover{opacity:.9;transform:scale(1.02)}
.attendance-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
/* Roster */
.roster-grid{display:grid;grid-template-columns:140px repeat(7,1fr);gap:1px;background:var(--border);border-radius:16px;overflow:hidden;margin-bottom:24px}
.roster-header{background:#F8FAFC;padding:12px 10px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;text-align:center}
.roster-name{background:#fff;padding:12px;font-size:13px;font-weight:500;display:flex;align-items:center}
.roster-cell{background:#fff;padding:8px;min-height:60px;vertical-align:top;position:relative}
.shift-block{border-radius:8px;padding:5px 8px;font-size:11px;font-weight:600;margin-bottom:3px;cursor:pointer}
.shift-morning{background:#DBEAFE;color:#1E40AF}
.shift-afternoon{background:#FEF3C7;color:#92400E}
.shift-night{background:#EDE9FE;color:#5B21B6}
.shift-off{background:#F1F5F9;color:#64748B}
/* Leave */
.leave-balance-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.leave-balance-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:20px;text-align:center}
.leave-balance-num{font-family:'Syne',sans-serif;font-size:36px;font-weight:700;margin:8px 0}
.leave-calendar{background:#fff;border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:16px}
.cal-day-header{text-align:center;font-size:11px;font-weight:600;color:var(--muted);padding:6px 0}
.cal-day{border-radius:8px;padding:8px 4px;text-align:center;font-size:13px;cursor:pointer;min-height:48px;position:relative}
.cal-day:hover{background:#F8FAFC}
.cal-day.today{background:var(--accent);color:#fff;font-weight:700}
.cal-day.has-leave{background:#FEE2E2;color:#991B1B}
.cal-day.approved-leave{background:#D1FAE5;color:#065F46}
.cal-day.empty{opacity:0}
/* Payroll Automation */
.payroll-summary{background:linear-gradient(135deg,#6366F1,#4F46E5);border-radius:18px;padding:28px;color:#fff;margin-bottom:24px}
.payroll-period{font-size:13px;opacity:.7;margin-bottom:8px}
.payroll-total{font-family:'Syne',sans-serif;font-size:44px;font-weight:700}
.payroll-breakdown{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:20px}
.payroll-breakdown-item{background:rgba(255,255,255,.12);border-radius:12px;padding:16px;text-align:center}
.payroll-breakdown-val{font-family:'Syne',sans-serif;font-size:22px;font-weight:700}
.payroll-breakdown-lbl{font-size:12px;opacity:.7;margin-top:4px}
/* Client isolation */
.client-badge{background:linear-gradient(135deg,#6366F1,#06B6D4);color:#fff;border-radius:20px;padding:3px 12px;font-size:11px;font-weight:600}
.client-selector{display:flex;align-items:center;gap:8px}
.client-selector select{border:1px solid var(--border);border-radius:9px;padding:6px 12px;font-size:13px;outline:none;background:#fff;cursor:pointer}
/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:#0F172A;color:#fff;border-radius:12px;padding:14px 20px;font-size:13px;z-index:9999;transform:translateY(100px);opacity:0;transition:all .3s;display:flex;align-items:center;gap:10px}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-left:4px solid #10B981}
.toast.error{border-left:4px solid #EF4444}
/* Notifications */
.notif-bell{position:relative;cursor:pointer;background:none;border:none;font-size:20px;padding:4px 8px}
.notif-badge{position:absolute;top:0;right:0;background:#EF4444;color:#fff;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
.notif-dropdown{position:absolute;top:48px;right:0;background:#fff;border:1px solid var(--border);border-radius:16px;width:320px;max-height:400px;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.12);z-index:300;display:none}
.notif-dropdown.open{display:block}
.notif-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-weight:600;font-size:14px}
.notif-item{padding:14px 20px;border-bottom:1px solid var(--border);cursor:pointer}
.notif-item:hover{background:#F8FAFC}
.notif-item:last-child{border-bottom:none}
.notif-item.unread{background:#EEF2FF}
.notif-text{font-size:13px;margin-bottom:4px}
.notif-time{font-size:11px;color:var(--muted)}
/* Global Search */
.global-search-wrap{position:relative}
.global-search{border:1px solid var(--border);border-radius:10px;padding:8px 14px 8px 36px;font-size:13px;outline:none;width:260px;color:var(--text);background:var(--bg)}
.global-search:focus{border-color:var(--accent);width:300px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px}
.search-results{position:absolute;top:42px;left:0;right:0;background:#fff;border:1px solid var(--border);border-radius:12px;max-height:320px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.1);z-index:300;display:none}
.search-results.open{display:block}
.search-result-item{padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--border);font-size:13px}
.search-result-item:hover{background:#F8FAFC}
.search-result-item:last-child{border-bottom:none}
.search-result-type{font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:600}
/* Tasks */
.task-item{display:flex;align-items:flex-start;gap:12px;padding:14px 0;border-bottom:1px solid var(--border)}
.task-item:last-child{border-bottom:none}
.task-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px}
.task-check.done{background:var(--success);border-color:var(--success);color:#fff}
.task-content{flex:1}
.task-title-text{font-size:14px;font-weight:500}
.task-title-text.done{text-decoration:line-through;color:var(--muted)}
.task-meta{font-size:12px;color:var(--muted);margin-top:3px}
.task-priority{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;margin-left:8px}
/* User Management */
.role-badge{background:#EDE9FE;color:#5B21B6;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600}
/* Responsive */
.hamburger{display:none;background:none;border:none;font-size:22px;cursor:pointer;padding:4px}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform .25s}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .main{margin-left:0}
  .hamburger{display:block}
  .stats-grid{grid-template-columns:1fr 1fr}
  .stats-grid-3{grid-template-columns:1fr 1fr}
  .stats-grid-5{grid-template-columns:1fr 1fr}
  .widgets-grid{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .form-row-3{grid-template-columns:1fr}
  .kanban{grid-template-columns:repeat(3,1fr)}
  .global-search{width:160px}
  .content{padding:16px}
  .acct-grid{grid-template-columns:1fr}
}
/* Section tabs */
.tabs{display:flex;gap:4px;background:#F1F5F9;border-radius:12px;padding:4px;margin-bottom:24px;width:fit-content}
.tab{padding:8px 18px;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);transition:all .15s}
.tab.active{background:#fff;color:var(--text);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.tab-content{display:none}
.tab-content.active{display:block}
/* Info box */
.info-box{background:#EEF2FF;border-radius:12px;padding:16px 20px;font-size:13px;color:#4338CA;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.info-box.success-box{background:#D1FAE5;color:#065F46}
.info-box.warning-box{background:#FEF3C7;color:#92400E}
</style>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- SIDEBAR OVERLAY (mobile) -->
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

<div id="auth-screen">
  <div class="auth-card">
    <div class="logo-mark"><div class="logo-icon">CA</div><div class="logo-text">CoreAxis <span>One</span></div></div>
    <div class="auth-title" id="auth-title">Welcome back</div>
    <div class="auth-sub" id="auth-sub">Sign in to your workspace</div>
    <div class="auth-error" id="auth-error"></div>
    <div id="signup-name-row" style="display:none"><input type="text" class="auth-input" id="full-name" placeholder="Full name"></div>
    <input type="email" class="auth-input" id="email" placeholder="Email address">
    <input type="password" class="auth-input" id="password" placeholder="Password">
    <button class="auth-btn" onclick="handleAuth()">Sign in</button>
    <div class="auth-toggle"><span id="toggle-text">Don't have an account?</span><a onclick="toggleMode()" id="toggle-link"> Sign up</a></div>
  </div>
</div>

<div id="app-screen">
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo"><div class="sidebar-logo-icon">CA</div><div class="sidebar-logo-text">CoreAxis <span>One</span></div></div>
      <nav class="sidebar-nav">
        <div class="nav-label">Overview</div>
        <div class="nav-item active" onclick="go('dashboard',this)"><span class="nav-icon">⊞</span>Dashboard</div>
        <div class="nav-label">Sales</div>
        <div class="nav-item" onclick="go('crm',this)"><span class="nav-icon">◎</span>CRM &amp; Leads</div>
        <div class="nav-item" onclick="go('pipeline',this)"><span class="nav-icon">⟶</span>Pipeline</div>
        <div class="nav-item" onclick="go('contacts',this)"><span class="nav-icon">✦</span>Contacts</div>
        <div class="nav-label">Operations</div>
        <div class="nav-item" onclick="go('helpdesk',this)"><span class="nav-icon">◈</span>Helpdesk</div>
        <div class="nav-item" onclick="go('contracts',this)"><span class="nav-icon">▣</span>Contracts</div>
        <div class="nav-item" onclick="go('billing',this)"><span class="nav-icon">◆</span>Billing</div>
        <div class="nav-label">Attendance</div>
        <div class="nav-item" onclick="go('attendance',this)"><span class="nav-icon">⏱</span>Clock In/Out</div>
        <div class="nav-item" onclick="go('roster',this)"><span class="nav-icon">📅</span>Roster</div>
        <div class="nav-item" onclick="go('leave',this)"><span class="nav-icon">🌴</span>Leave</div>
        <div class="nav-label">People</div>
        <div class="nav-item" onclick="go('hr',this)"><span class="nav-icon">❖</span>HR &amp; Agents</div>
        <div class="nav-item" onclick="go('timesheets',this)"><span class="nav-icon">◷</span>Timesheets</div>
        <div class="nav-item" onclick="go('payroll',this)"><span class="nav-icon">💵</span>Payroll</div>
        <div class="nav-label">Finance</div>
        <div class="nav-item" onclick="go('accounting',this)"><span class="nav-icon">▦</span>Accounting</div>
        <div class="nav-label">System</div>
        <div class="nav-item" onclick="go('tasks',this)"><span class="nav-icon">✓</span>Tasks</div>
        <div class="nav-item" onclick="go('clients',this)"><span class="nav-icon">🏢</span>Clients</div>
        <div class="nav-item" onclick="go('users',this)"><span class="nav-icon">👤</span>Users</div>
        <div class="nav-item" onclick="go('settings',this)"><span class="nav-icon">◌</span>Settings</div>
      </nav>
      <div class="sidebar-footer">
        <div class="user-pill">
          <div class="user-avatar" id="sidebar-avatar">K</div>
          <div class="user-info"><div class="user-name" id="sidebar-name">Karim</div><div class="user-role" id="sidebar-role">Administrator</div></div>
          <button class="logout-btn" onclick="logout()">⏻</button>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="hamburger" onclick="openSidebar()">☰</button>
          <div class="page-title" id="page-title">Dashboard</div>
        </div>
        <div class="topbar-right">
          <!-- Global Search -->
          <div class="global-search-wrap">
            <span class="search-icon">🔍</span>
            <input class="global-search" placeholder="Search anything..." oninput="globalSearch(this.value)" onfocus="globalSearch(this.value)" id="global-search">
            <div class="search-results" id="search-results"></div>
          </div>
          <!-- Notifications -->
          <div style="position:relative">
            <button class="notif-bell" onclick="toggleNotifications()">🔔<span class="notif-badge" id="notif-count" style="display:none">0</span></button>
            <div class="notif-dropdown" id="notif-dropdown">
              <div class="notif-header"><span>Notifications</span><button class="action-btn" onclick="markAllRead()" style="font-size:12px">Mark all read</button></div>
              <div id="notif-list"></div>
            </div>
          </div>
          <button class="btn-primary" id="add-btn" onclick="openAdd()" style="display:none">+ Add New</button>
        </div>
      </div>

      <div class="content">

        <!-- DASHBOARD -->
        <div id="page-dashboard" class="module-page active">
          <div class="stats-grid">
            <div class="stat-card"><div class="stat-icon" style="background:#EEF2FF">🎯</div><div class="stat-label">Total Leads</div><div class="stat-value" id="d-leads">0</div><div class="stat-sub">Live from database</div></div>
            <div class="stat-card"><div class="stat-icon" style="background:#F0FDF4">👥</div><div class="stat-label">Active Agents</div><div class="stat-value" id="d-agents">0</div><div class="stat-sub">Live from database</div></div>
            <div class="stat-card"><div class="stat-icon" style="background:#FFFBEB">🎫</div><div class="stat-label">Open Tickets</div><div class="stat-value" id="d-tickets">0</div><div class="stat-sub">Helpdesk</div></div>
            <div class="stat-card"><div class="stat-icon" style="background:#FFF1F2">💰</div><div class="stat-label">Revenue (USD)</div><div class="stat-value" id="d-revenue">$0</div><div class="stat-sub">Closed won deals</div></div>
          </div>
          <div class="stats-grid-3" style="margin-bottom:24px">
            <div class="stat-card"><div class="stat-icon" style="background:#CFFAFE">⏱</div><div class="stat-label">Clocked In Now</div><div class="stat-value" id="d-clocked">0</div><div class="stat-sub">Agents active</div></div>
            <div class="stat-card"><div class="stat-icon" style="background:#FEF3C7">🌴</div><div class="stat-label">On Leave Today</div><div class="stat-value" id="d-leave">0</div><div class="stat-sub">Approved leaves</div></div>
            <div class="stat-card"><div class="stat-icon" style="background:#FEE2E2">⚠️</div><div class="stat-label">Pending Leaves</div><div class="stat-value" id="d-leave-pending">0</div><div class="stat-sub">Awaiting approval</div></div>
          </div>
          <div class="widgets-grid">
            <div class="widget"><div class="widget-title">Recent Leads</div><div id="dash-leads"><div class="loading">Loading...</div></div></div>
            <div class="widget"><div class="widget-title">Recent Activity</div><div id="dash-activity"><div class="loading">Loading...</div></div></div>
          </div>
        </div>

        <!-- CRM -->
        <div id="page-crm" class="module-page">
          <div class="table-wrap">
            <div class="table-head">
              <div class="table-title">All Leads</div>
              <div class="table-actions">
                <input class="search-box" placeholder="Search leads..." oninput="filterLeads(this.value)">
                <button class="btn-secondary" onclick="exportLeadsCSV()" style="font-size:12px;padding:6px 12px">Export CSV</button>
              </div>
            </div>
            <div id="crm-body"><div class="loading">Loading...</div></div>
          </div>
        </div>

        <!-- PIPELINE -->
        <div id="page-pipeline" class="module-page">
          <div class="widget" style="margin-bottom:20px"><div class="widget-title">Sales Pipeline</div><div class="kanban" id="kanban-board"></div></div>
        </div>

        <!-- CONTACTS -->
        <div id="page-contacts" class="module-page">
          <div class="table-wrap">
            <div class="table-head">
              <div class="table-title">Contacts</div>
              <input class="search-box" placeholder="Search contacts..." oninput="filterContacts(this.value)">
            </div>
            <div id="contacts-body"><div class="loading">Loading...</div></div>
          </div>
        </div>

        <!-- HELPDESK -->
        <div id="page-helpdesk" class="module-page">
          <div class="stats-grid-3">
            <div class="stat-card"><div class="stat-icon" style="background:#EEF2FF">🎫</div><div class="stat-label">Open</div><div class="stat-value" id="tk-open">0</div></div>
            <div class="stat-card"><div class="stat-icon" style="background:#FFFBEB">⏳</div><div class="stat-label">In Progress</div><div class="stat-value" id="tk-progress">0</div></div>
            <div class="stat-card"><div class="stat-icon" style="background:#F0FDF4">✅</div><div class="stat-label">Resolved</div><div class="stat-value" id="tk-resolved">0</div></div>
          </div>
          <div class="table-wrap"><div class="table-head"><div class="table-title">Support Tickets</div></div><div id="helpdesk-body"><div class="loading">Loading...</div></div></div>
        </div>

        <!-- CONTRACTS -->
        <div id="page-contracts" class="module-page">
          <div class="table-wrap"><div class="table-head"><div class="table-title">Contracts</div></div><div id="contracts-body"><div class="loading">Loading...</div></div></div>
        </div>

        <!-- BILLING -->
        <div id="page-billing" class="module-page">
          <div class="stats-grid-3">
            <div class="stat-card"><div class="stat-icon" style="background:#F0FDF4">💵</div><div class="stat-label">Paid</div><div class="stat-value" id="inv-paid">$0</div></div>
            <div class="stat-card"><div class="stat-icon" style="background:#FFFBEB">⏳</div><div class="stat-label">Pending</div><div class="stat-value" id="inv-pending">$0</div></div>
            <div class="stat-card"><div class="stat-icon" style="background:#FFF1F2">⚠️</div><div class="stat-label">Overdue</div><div class="stat-value" id="inv-overdue">$0</div></div>
          </div>
          <div class="table-wrap"><div class="table-head"><div class="table-title">Invoices</div></div><div id="billing-body"><div class="loading">Loading...</div></div></div>
        </div>

        <!-- ATTENDANCE / CLOCK IN-OUT -->
        <div id="page-attendance" class="module-page">
          <div class="clock-hero">
            <div class="clock-time" id="live-clock">00:00:00</div>
            <div class="clock-date" id="live-date"></div>
            <div class="clock-status" id="clock-status-badge"><span class="clock-status-dot" id="clock-dot" style="background:#94A3B8"></span><span id="clock-status-text">Not Clocked In</span></div>
            <div id="clock-session-info" style="font-size:13px;color:rgba(255,255,255,.5);margin-bottom:20px;display:none">Session started at <span id="clock-in-time-display"></span></div>
            <br>
            <button class="clock-btn clock-in-btn" id="clock-action-btn" onclick="toggleClock()">Clock In</button>
          </div>
          <div class="attendance-grid">
            <div class="stat-card"><div class="stat-icon" style="background:#D1FAE5">✅</div><div class="stat-label">Today Present</div><div class="stat-value" id="att-today">0</div></div>
            <div class="stat-card"><div class="stat-icon" style="background:#FEE2E2">⚠️</div><div class="stat-label">Late Arrivals</div><div class="stat-value" id="att-late">0</div></div>
            <div class="stat-card"><div class="stat-icon" style="background:#EEF2FF">⏱</div><div class="stat-label">Avg Hours/Day</div><div class="stat-value" id="att-avg">0h</div></div>
            <div class="stat-card"><div class="stat-icon" style="background:#CFFAFE">🏃</div><div class="stat-label">Currently In</div><div class="stat-value" id="att-in">0</div></div>
          </div>
          <div class="table-wrap">
            <div class="table-head">
              <div class="table-title">Attendance Log</div>
              <div class="table-actions">
                <input class="search-box" placeholder="Search agent..." oninput="filterAttendance(this.value)" id="att-search">
                <button class="btn-secondary" onclick="exportAttendanceCSV()" style="font-size:12px;padding:6px 12px">Export CSV</button>
              </div>
            </div>
            <div id="attendance-body"><div class="loading">Loading...</div></div>
          </div>
        </div>

        <!-- ROSTER -->
        <div id="page-roster" class="module-page">
          <div class="table-head" style="background:#fff;border:1px solid var(--border);border-radius:16px;margin-bottom:20px;padding:16px 20px">
            <div class="table-title">Weekly Roster</div>
            <div class="table-actions">
              <button class="btn-secondary" onclick="rosterPrevWeek()">← Prev</button>
              <span id="roster-week-label" style="font-size:13px;font-weight:600;color:var(--muted)"></span>
              <button class="btn-secondary" onclick="rosterNextWeek()">Next →</button>
              <button class="btn-primary" onclick="openModal('shift-modal')">+ Assign Shift</button>
            </div>
          </div>
          <div id="roster-grid-wrap"><div class="loading">Loading...</div></div>
          <div class="table-wrap" style="margin-top:20px">
            <div class="table-head"><div class="table-title">Shift Records</div></div>
            <div id="shifts-body"><div class="loading">Loading...</div></div>
          </div>
        </div>

        <!-- LEAVE -->
        <div id="page-leave" class="module-page">
          <div class="tabs">
            <div class="tab active" onclick="switchLeaveTab('apply',this)">Apply for Leave</div>
            <div class="tab" onclick="switchLeaveTab('my',this)">My Leaves</div>
            <div class="tab" onclick="switchLeaveTab('manage',this)">Manage All</div>
            <div class="tab" onclick="switchLeaveTab('calendar',this)">Calendar</div>
          </div>
          <div class="tab-content active" id="leave-tab-apply">
            <div class="widget" style="max-width:600px">
              <div class="widget-title">Submit Leave Request</div>
              <div class="form-group"><label class="form-label">Your Name</label><input type="text" class="form-control" id="lv-agent-name" placeholder="Agent name"></div>
              <div class="form-row">
                <div class="form-group"><label class="form-label">Leave Type</label><select class="form-control" id="lv-type"><option value="vacation">Vacation</option><option value="sick">Sick Leave</option><option value="emergency">Emergency</option><option value="personal">Personal</option><option value="maternity">Maternity/Paternity</option></select></div>
                <div class="form-group"><label class="form-label">Days Requested</label><input type="number" class="form-control" id="lv-days" min="1" value="1"></div>
              </div>
              <div class="form-row">
                <div class="form-group"><label class="form-label">Start Date</label><input type="date" class="form-control" id="lv-start"></div>
                <div class="form-group"><label class="form-label">End Date</label><input type="date" class="form-control" id="lv-end"></div>
              </div>
              <div class="form-group"><label class="form-label">Reason</label><textarea class="form-control" id="lv-reason" rows="3" placeholder="Brief reason for leave..."></textarea></div>
              <button class="btn-primary" onclick="submitLeave()">Submit Request</button>
            </div>
          </div>
          <div class="tab-content" id="leave-tab-my">
            <div class="leave-balance-grid">
              <div class="leave-balance-card"><div class="stat-label">Vacation Days Left</div><div class="leave-balance-num" style="color:#6366F1">14</div></div>
              <div class="leave-balance-card"><div class="stat-label">Sick Days Left</div><div class="leave-balance-num" style="color:#10B981">7</div></div>
              <div class="leave-balance-card"><div class="stat-label">Used This Year</div><div class="leave-balance-num" id="leave-used" style="color:#F59E0B">0</div></div>
            </div>
            <div class="table-wrap"><div class="table-head"><div class="table-title">My Leave History</div></div><div id="my-leave-body"><div class="loading">Loading...</div></div></div>
          </div>
          <div class="tab-content" id="leave-tab-manage">
            <div class="table-wrap">
              <div class="table-head">
                <div class="table-title">All Leave Requests</div>
                <div class="table-actions"><select class="search-box" onchange="filterLeaveByStatus(this.value)" style="width:140px"><option value="">All Status</option><option value="pending">Pending</option><option value="approved">Approved</option><option value="rejected">Rejected</option></select></div>
              </div>
              <div id="all-leave-body"><div class="loading">Loading...</div></div>
            </div>
          </div>
          <div class="tab-content" id="leave-tab-calendar">
            <div class="leave-calendar">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
                <button class="btn-secondary" onclick="calPrevMonth()">← Prev</button>
                <div class="widget-title" id="cal-month-label" style="margin:0"></div>
                <button class="btn-secondary" onclick="calNextMonth()">Next →</button>
              </div>
              <div class="cal-grid" id="cal-headers"></div>
              <div class="cal-grid" id="cal-days"></div>
              <div style="display:flex;gap:20px;margin-top:20px;font-size:12px">
                <div style="display:flex;align-items:center;gap:6px"><div style="width:16px;height:16px;background:#FEE2E2;border-radius:4px"></div> Pending</div>
                <div style="display:flex;align-items:center;gap:6px"><div style="width:16px;height:16px;background:#D1FAE5;border-radius:4px"></div> Approved</div>
                <div style="display:flex;align-items:center;gap:6px"><div style="width:16px;height:16px;background:var(--accent);border-radius:4px"></div> Today</div>
              </div>
            </div>
          </div>
        </div>

        <!-- HR & AGENTS -->
        <div id="page-hr" class="module-page">
          <div class="table-wrap">
            <div class="table-head">
              <div class="table-title">Agents &amp; Staff</div>
              <div class="table-actions">
                <div class="client-selector"><span style="font-size:12px;color:var(--muted);font-weight:600">CLIENT:</span><select class="form-control" id="hr-client-filter" onchange="loadHR(currentAgents)" style="width:160px;padding:6px 10px;font-size:12px"><option value="">All Clients</option></select></div>
              </div>
            </div>
            <div id="hr-body"><div class="loading">Loading...</div></div>
          </div>
        </div>

        <!-- TIMESHEETS -->
        <div id="page-timesheets" class="module-page">
          <div class="stats-grid-3">
            <div class="stat-card"><div class="stat-icon" style="background:#EEF2FF">⏱️</div><div class="stat-label">Total Hours</div><div class="stat-value" id="ts-total">0</div></div>
            <div class="stat-card"><div class="stat-icon" style="background:#FFFBEB">⏳</div><div class="stat-label">Pending</div><div class="stat-value" id="ts-pending">0</div></div>
            <div class="stat-card"><div class="stat-icon" style="background:#F0FDF4">✅</div><div class="stat-label">Approved</div><div class="stat-value" id="ts-approved">0</div></div>
          </div>
          <div class="table-wrap"><div class="table-head"><div class="table-title">Timesheet Records</div></div><div id="timesheets-body"><div class="loading">Loading...</div></div></div>
        </div>

        <!-- PAYROLL (with automation) -->
        <div id="page-payroll" class="module-page">
          <div class="tabs">
            <div class="tab active" onclick="switchPayrollTab('records',this)">Records</div>
            <div class="tab" onclick="switchPayrollTab('auto',this)">Auto-Calculate</div>
          </div>
          <div class="tab-content active" id="payroll-tab-records">
            <div class="stats-grid-3" style="margin-bottom:20px">
              <div class="stat-card"><div class="stat-icon" style="background:#F0FDF4">💰</div><div class="stat-label">Total Paid</div><div class="stat-value" id="pr-paid">$0</div></div>
              <div class="stat-card"><div class="stat-icon" style="background:#FFFBEB">⏳</div><div class="stat-label">Pending</div><div class="stat-value" id="pr-pending">$0</div></div>
              <div class="stat-card"><div class="stat-icon" style="background:#EEF2FF">👥</div><div class="stat-label">Records</div><div class="stat-value" id="pr-count">0</div></div>
            </div>
            <div class="table-wrap">
              <div class="table-head">
                <div class="table-title">Payroll Records</div>
                <button class="btn-secondary" onclick="exportPayrollCSV()" style="font-size:12px;padding:6px 12px">Export CSV</button>
              </div>
              <div id="payroll-body"><div class="loading">Loading...</div></div>
            </div>
          </div>
          <div class="tab-content" id="payroll-tab-auto">
            <div class="info-box">💡 Select a period and the system will auto-calculate pay from approved timesheets including overtime.</div>
            <div class="widget" style="max-width:600px;margin-bottom:24px">
              <div class="widget-title">Payroll Period Setup</div>
              <div class="form-row">
                <div class="form-group"><label class="form-label">Period Start</label><input type="date" class="form-control" id="auto-pr-start"></div>
                <div class="form-group"><label class="form-label">Period End</label><input type="date" class="form-control" id="auto-pr-end"></div>
              </div>
              <div class="form-row">
                <div class="form-group"><label class="form-label">Overtime Threshold (hrs/day)</label><input type="number" class="form-control" id="auto-ot-daily" value="8"></div>
                <div class="form-group"><label class="form-label">Overtime Rate Multiplier</label><input type="number" class="form-control" id="auto-ot-mult" value="1.5" step="0.1"></div>
              </div>
              <div class="form-group"><label class="form-label">Deduction per Agent (USD)</label><input type="number" class="form-control" id="auto-deduction" value="0" style="max-width:200px"></div>
              <button class="btn-primary" onclick="runPayrollCalculation()">Calculate Payroll</button>
            </div>
            <div id="payroll-calc-results" style="display:none">
              <div class="payroll-summary">
                <div class="payroll-period" id="calc-period-label"></div>
                <div style="font-size:13px;opacity:.7;margin-bottom:4px">Total Payroll</div>
                <div class="payroll-total" id="calc-total">$0</div>
                <div class="payroll-breakdown">
                  <div class="payroll-breakdown-item"><div class="payroll-breakdown-val" id="calc-base">$0</div><div class="payroll-breakdown-lbl">Base Pay</div></div>
                  <div class="payroll-breakdown-item"><div class="payroll-breakdown-val" id="calc-ot">$0</div><div class="payroll-breakdown-lbl">Overtime</div></div>
                  <div class="payroll-breakdown-item"><div class="payroll-breakdown-val" id="calc-agents">0</div><div class="payroll-breakdown-lbl">Agents</div></div>
                </div>
              </div>
              <div class="table-wrap">
                <div class="table-head">
                  <div class="table-title">Breakdown per Agent</div>
                  <button class="btn-primary" onclick="saveCalculatedPayroll()">Save to Payroll</button>
                </div>
                <div id="calc-table-body"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- ACCOUNTING -->
        <div id="page-accounting" class="module-page">
          <div class="acct-grid">

let isSignup=false;
function toggleMode(){isSignup=!isSignup;document.getElementById('auth-title').textContent=isSignup?'Create account':'Welcome back';document.getElementById('auth-sub').textContent=isSignup?'Join CoreAxis One':'Sign in to your workspace';document.getElementById('toggle-text').textContent=isSignup?'Already have an account?':"Don't have an account?";document.getElementById('toggle-link').textContent=isSignup?' Sign in':' Sign up';document.getElementById('signup-name-row').style.display=isSignup?'block':'none';}
async function handleAuth(){const email=document.getElementById('email').value,pass=document.getElementById('password').value,err=document.getElementById('auth-error');err.style.display='none';if(!email||!pass){err.textContent='Please fill in all fields.';err.style.display='block';return;}if(isSignup){const{data,error}=await sb.auth.signUp({email,password:pass,options:{data:{full_name:document.getElementById('full-name').value}}});if(error){err.textContent=error.message;err.style.display='block';return;}user=data.user;showApp();}else{const{data,error}=await sb.auth.signInWithPassword({email,password:pass});if(error){err.textContent=error.message;err.style.display='block';return;}user=data.user;showApp();}}
async function showApp(){document.getElementById('auth-screen').style.display='none';document.getElementById('app-screen').style.display='block';if(user){const name=user.user_metadata?.full_name||user.email?.split('@')[0]||'User';document.getElementById('sidebar-name').textContent=name;document.getElementById('sidebar-avatar').textContent=name.charAt(0).toUpperCase();const se=document.getElementById('settings-email');if(se)se.value=user.email||'';}await loadDashboard();loadNotifications();loadClients();}

function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent='';t.className='toast '+(type==='success'?'success':'error');const icon=document.createElement('span');icon.textContent=type==='success'?'✓':'✕';t.appendChild(icon);const txt=document.createTextNode(' '+msg);t.appendChild(txt);t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

function sColor(s){const m={new:'#6366F1',contacted:'#06B6D4',qualified:'#10B981',proposal:'#F59E0B',closed_won:'#10B981',closed_lost:'#EF4444'};return m[s]||'#94A3B8';}
function sBadge(s){const m={new:'bg-purple',contacted:'bg-blue',qualified:'bg-green',proposal:'bg-amber',closed_won:'bg-green',closed_lost:'bg-red',draft:'bg-gray',sent:'bg-blue',active:'bg-green',expired:'bg-red',cancelled:'bg-red',paid:'bg-green',overdue:'bg-red',open:'bg-purple',in_progress:'bg-amber',resolved:'bg-green',closed:'bg-gray',pending:'bg-amber',approved:'bg-green',rejected:'bg-red',onboarding:'bg-amber',inactive:'bg-gray',low:'bg-green',medium:'bg-amber',high:'bg-red',urgent:'bg-red',income:'bg-green',expense:'bg-red',morning:'bg-blue',afternoon:'bg-amber',night:'bg-purple',off:'bg-gray',super_admin:'bg-purple',manager:'bg-blue',team_lead:'bg-cyan',billing_admin:'bg-amber',agent:'bg-gray',vacation:'bg-blue',sick:'bg-red',emergency:'bg-red',personal:'bg-gray',maternity:'bg-green',clocked_in:'bg-green',clocked_out:'bg-gray'};return m[s]||'bg-gray';}

async function loadDashboard(){
  const[{data:leads},{data:agents},{data:tickets},{data:invoices},{data:attendance},{data:leaves}]=await Promise.all([
    sb.from('leads').select('*').order('created_at',{ascending:false}),
    sb.from('agents').select('*'),
    sb.from('tickets').select('*'),
    sb.from('invoices').select('*'),
    sb.from('timesheets').select('*'),
    sb.from('timesheets').select('*').eq('status','leave').gte('date',new Date().toISOString().split('T')[0]).lte('date',new Date().toISOString().split('T')[0])
  ]);
  allLeads=leads||[];currentAgents=agents||[];
  document.getElementById('d-leads').textContent=allLeads.length;
  document.getElementById('d-agents').textContent=(agents||[]).filter(a=>a.status==='active').length;
  document.getElementById('d-tickets').textContent=(tickets||[]).filter(t=>t.status==='open').length;
  const rev=allLeads.filter(l=>l.status==='closed_won').reduce((s,l)=>s+(l.deal_value||0),0);
  document.getElementById('d-revenue').textContent='$'+rev.toLocaleString();
  // Clock In stats from attendance table
  loadAttendanceStats();
  // Leave stats from leaves table
  loadLeaveStats();
  const recent=allLeads.slice(0,5);
  document.getElementById('dash-leads').innerHTML=recent.length?recent.map(l=>`<div class="pipeline-item"><div class="pipeline-dot" style="background:${sColor(l.status)}"></div><div class="pipeline-name">${l.first_name||''} ${l.last_name||''}<br><small style="color:var(--muted)">${l.company||'—'}</small></div><span class="badge ${sBadge(l.status)}">${l.status}</span></div>`).join(''):'<div style="color:var(--muted);font-size:13px;padding:16px 0">No leads yet. Add your first lead!</div>';
  loadCRM(allLeads);loadPipeline(allLeads);loadContacts(allLeads);loadHR(agents||[]);loadHelpdesk(tickets||[]);loadBilling(invoices||[]);
  loadActivityLog();
}

async function loadActivityLog(){
  const el=document.getElementById('dash-activity');
  const{data}=await sb.from('activity_log').select('*').order('created_at',{ascending:false}).limit(8).catch(()=>({data:null}));
  if(!data||!data.length){el.innerHTML='<div style="color:var(--muted);font-size:13px">No activity yet.</div>';return;}
  const colors=['#6366F1','#10B981','#F59E0B','#EF4444','#06B6D4'];
  el.innerHTML=data.map((a,i)=>`<div class="activity-item"><div class="activity-dot" style="background:${colors[i%colors.length]}"></div><div><div class="activity-text">${a.action||a.description||'Activity'}</div><div class="activity-time">${timeAgo(a.created_at)}</div></div></div>`).join('');
}

async function logActivity(action){
  await sb.from('activity_log').insert({action,user_email:user?.email||'system',created_at:new Date().toISOString()}).catch(()=>{});
}

function timeAgo(iso){if(!iso)return '';const d=new Date(iso),now=new Date(),diff=Math.floor((now-d)/1000);if(diff<60)return diff+'s ago';if(diff<3600)return Math.floor(diff/60)+'m ago';if(diff<86400)return Math.floor(diff/3600)+'h ago';return Math.floor(diff/86400)+'d ago';}

function loadCRM(leads){document.getElementById('crm-body').innerHTML=`<table><thead><tr><th>Name</th><th>Company</th><th>Email</th><th>Phone</th><th>Status</th><th>Value</th><th>Actions</th></tr></thead><tbody>${leads.length?leads.map(l=>`<tr><td><strong>${l.first_name||''} ${l.last_name||''}</strong></td><td>${l.company||'—'}</td><td>${l.email||'—'}</td><td>${l.phone||'—'}</td><td><span class="badge ${sBadge(l.status)}">${l.status}</span></td><td><strong>$${(l.deal_value||0).toLocaleString()}</strong></td><td><button class="action-btn delete-btn" onclick="deleteLead('${l.id}')">Delete</button></td></tr>`).join(''):'<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:32px">No leads yet.</td></tr>'}</tbody></table>`;}
function filterLeads(q){loadCRM(allLeads.filter(l=>`${l.first_name} ${l.last_name} ${l.company} ${l.email}`.toLowerCase().includes(q.toLowerCase())));}
async function deleteLead(id){if(!confirm('Delete this lead?'))return;await sb.from('leads').delete().eq('id',id);await loadDashboard();showToast('Lead deleted');}
function exportLeadsCSV(){const rows=[['First Name','Last Name','Company','Email','Phone','Status','Deal Value'],...allLeads.map(l=>[l.first_name,l.last_name,l.company,l.email,l.phone,l.status,l.deal_value])];downloadCSV(rows,'leads_export.csv');}
function downloadCSV(rows,filename){const csv=rows.map(r=>r.map(v=>`"${(v||'').toString().replace(/"/g,'""')}"`).join(',')).join('\n');const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download=filename;a.click();}

// ======= CLOCK IN/OUT =======
async function loadAttendanceStats(){
  const today=new Date().toISOString().split('T')[0];
  const{data:todayRecords}=await sb.from('timesheets').select('*').gte('date',today).lte('date',today).catch(()=>({data:[]}));
  const records=todayRecords||[];
  document.getElementById('d-clocked').textContent=records.filter(r=>r.clock_in&&!r.clock_out).length;
  document.getElementById('att-today')&&(document.getElementById('att-today').textContent=records.filter(r=>r.clock_in).length);
  document.getElementById('att-in')&&(document.getElementById('att-in').textContent=records.filter(r=>r.clock_in&&!r.clock_out).length);
  const workStart=document.getElementById('work-start-time')?.value||'09:00';
  document.getElementById('att-late')&&(document.getElementById('att-late').textContent=records.filter(r=>{if(!r.clock_in)return false;const t=r.clock_in.split('T')[1]||r.clock_in;return t>workStart;}).length);
  if(records.length){const avgH=records.filter(r=>r.hours_worked).reduce((s,r)=>s+(r.hours_worked||0),0)/(records.filter(r=>r.hours_worked).length||1);document.getElementById('att-avg')&&(document.getElementById('att-avg').textContent=avgH.toFixed(1)+'h');}
}
async function loadAttendancePage(){
  await loadAttendanceStats();
  const{data}=await sb.from('timesheets').select('*').order('created_at',{ascending:false}).limit(100);
  allAttendance=data||[];
  renderAttendance(allAttendance);
  // Check if user currently clocked in
  const todayStr=new Date().toISOString().split('T')[0];
  const myName=document.getElementById('sidebar-name').textContent;
  const myRecord=allAttendance.find(r=>r.agent_name===myName&&r.date===todayStr&&r.clock_in&&!r.clock_out);
  if(myRecord){clockedIn=true;clockInTime=new Date(myRecord.clock_in);updateClockUI();}
}
function renderAttendance(records){
  document.getElementById('attendance-body').innerHTML=`<table><thead><tr><th>Agent</th><th>Date</th><th>Clock In</th><th>Clock Out</th><th>Hours</th><th>OT</th><th>Status</th></tr></thead><tbody>${records.length?records.map(r=>`<tr><td><strong>${r.agent_name||'—'}</strong></td><td>${r.date||'—'}</td><td>${r.clock_in?new Date(r.clock_in).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}):'—'}</td><td>${r.clock_out?new Date(r.clock_out).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}):'<span class="badge bg-green">Active</span>'}</td><td>${r.hours_worked?r.hours_worked.toFixed(2)+'h':'—'}</td><td>${r.overtime_hours?`<span style="color:#EF4444;font-weight:600">+${r.overtime_hours.toFixed(2)}h</span>`:'—'}</td><td><span class="badge ${r.clock_out?'bg-gray':'bg-green'}">${r.clock_out?'Done':'Clocked In'}</span></td></tr>`).join(''):'<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:32px">No attendance records yet.</td></tr>'}</tbody></table>`;
}
function filterAttendance(q){renderAttendance(allAttendance.filter(r=>(r.agent_name||'').toLowerCase().includes(q.toLowerCase())));}
function exportAttendanceCSV(){const rows=[['Agent','Date','Clock In','Clock Out','Hours Worked','OT Hours'],...allAttendance.map(r=>[r.agent_name,r.date,r.clock_in||'',r.clock_out||'',r.hours_worked||0,r.overtime_hours||0])];downloadCSV(rows,'attendance_export.csv');showToast('CSV downloaded');}

async function toggleClock(){
  const agentName=document.getElementById('sidebar-name').textContent;
  const now=new Date();
  if(!clockedIn){
    // Clock In
    clockedIn=true;
    clockInTime=now;
    const{data,error}=await sb.from('timesheets').insert({agent_name:agentName,date:now.toISOString().split('T')[0],clock_in:now.toISOString(),status:'pending',task:'Attendance'}).select().single();
    if(!error){localStorage.setItem('clock_record_id',data.id);}
    updateClockUI();
    await logActivity(agentName+' clocked in at '+now.toLocaleTimeString());
    showToast('Clocked in successfully!');
  }else{
    // Clock Out
    const recordId=localStorage.getItem('clock_record_id');
    const hoursWorked=(now-clockInTime)/3600000;
    const otThreshold=8;
    const regularHours=Math.min(hoursWorked,otThreshold);
    const otHours=Math.max(0,hoursWorked-otThreshold);
    if(recordId){
      await sb.from('timesheets').update({clock_out:now.toISOString(),hours_worked:parseFloat(hoursWorked.toFixed(2)),overtime_hours:otHours>0?parseFloat(otHours.toFixed(2)):null}).eq('id',recordId);
      localStorage.removeItem('clock_record_id');
    }
    clockedIn=false;clockInTime=null;
    updateClockUI();
    await logActivity(agentName+' clocked out. Total: '+hoursWorked.toFixed(2)+'h'+( otHours>0?' ('+otHours.toFixed(2)+'h OT)':''));
    showToast('Clocked out. '+hoursWorked.toFixed(2)+'h logged'+(otHours>0?' • '+otHours.toFixed(2)+'h OT':''));
    loadAttendancePage();
  }
}
function updateClockUI(){
  const btn=document.getElementById('clock-action-btn');
  const dot=document.getElementById('clock-dot');
  const statusText=document.getElementById('clock-status-text');
  const sessionInfo=document.getElementById('clock-session-info');
  const timeDisplay=document.getElementById('clock-in-time-display');
  if(clockedIn){
    btn.textContent='Clock Out';
    btn.className='clock-btn clock-out-btn';
    dot.style.background='#10B981';
    statusText.textContent='Clocked In';
    if(clockInTime){sessionInfo.style.display='block';timeDisplay.textContent=clockInTime.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});}
  }else{
    btn.textContent='Clock In';
    btn.className='clock-btn clock-in-btn';
    dot.style.background='#94A3B8';
    statusText.textContent='Not Clocked In';
    sessionInfo.style.display='none';
  }
}

function getRosterWeekDates(){
  const now=new Date();
  const dayOfWeek=now.getDay();
  const monday=new Date(now);
  monday.setDate(now.getDate()-dayOfWeek+1+(rosterWeekOffset*7));
  monday.setHours(0,0,0,0);
  const days=[];
  for(let i=0;i<7;i++){const d=new Date(monday);d.setDate(monday.getDate()+i);days.push(d);}
  return days;
}

// ======= PAYROLL AUTO-CALCULATE =======
async function runPayrollCalculation(){
  const start=document.getElementById('auto-pr-start').value;
  const end=document.getElementById('auto-pr-end').value;
  const otThreshold=parseFloat(document.getElementById('auto-ot-daily').value)||8;
  const otMult=parseFloat(document.getElementById('auto-ot-mult').value)||1.5;
  const deduction=parseFloat(document.getElementById('auto-deduction').value)||0;
  if(!start||!end){showToast('Select a period first','error');return;}
  const{data:ts}=await sb.from('timesheets').select('*').gte('date',start).lte('date',end).eq('status','approved').eq('is_leave',null);
  const{data:agents}=await sb.from('agents').select('*');
  const agentMap={};(agents||[]).forEach(a=>{const name=a.first_name+' '+a.last_name;agentMap[name]={rate:a.hourly_rate||0};});
  // Group by agent
  const byAgent={};(ts||[]).forEach(t=>{if(!t.agent_name)return;if(!byAgent[t.agent_name])byAgent[t.agent_name]={hours:0,otHours:0,rate:agentMap[t.agent_name]?.rate||0,days:{}};const dayKey=t.date||'';if(!byAgent[t.agent_name].days[dayKey])byAgent[t.agent_name].days[dayKey]=0;byAgent[t.agent_name].days[dayKey]+=(t.hours_worked||0);});
  // Calculate with OT per day
  Object.keys(byAgent).forEach(name=>{const ag=byAgent[name];let totalReg=0,totalOT=0;Object.values(ag.days).forEach(h=>{const reg=Math.min(h,otThreshold);const ot=Math.max(0,h-otThreshold);totalReg+=reg;totalOT+=ot;});ag.hours=totalReg;ag.otHours=totalOT;ag.basePay=totalReg*ag.rate;ag.otPay=totalOT*ag.rate*otMult;ag.total=ag.basePay+ag.otPay-deduction;});
  calcResults=Object.entries(byAgent).map(([name,d])=>({name,...d}));
  const grandTotal=calcResults.reduce((s,r)=>s+(r.total||0),0);
  const grandBase=calcResults.reduce((s,r)=>s+(r.basePay||0),0);
  const grandOT=calcResults.reduce((s,r)=>s+(r.otPay||0),0);
  document.getElementById('payroll-calc-results').style.display='block';
  document.getElementById('calc-period-label').textContent=start+' → '+end;
  document.getElementById('calc-total').textContent='$'+grandTotal.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
  document.getElementById('calc-base').textContent='$'+grandBase.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
  document.getElementById('calc-ot').textContent='$'+grandOT.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
  document.getElementById('calc-agents').textContent=calcResults.length;
  document.getElementById('calc-table-body').innerHTML=`<table><thead><tr><th>Agent</th><th>Reg Hours</th><th>OT Hours</th><th>Rate</th><th>Base Pay</th><th>OT Pay</th><th>Deduction</th><th>Total</th></tr></thead><tbody>${calcResults.length?calcResults.map(r=>`<tr><td><strong>${r.name}</strong></td><td>${r.hours.toFixed(2)}h</td><td>${r.otHours>0?`<span style="color:#EF4444">+${r.otHours.toFixed(2)}h</span>`:'—'}</td><td>$${r.rate}/hr</td><td>$${r.basePay.toFixed(2)}</td><td>${r.otHours>0?`$${r.otPay.toFixed(2)}`:'—'}</td><td>${deduction>0?`-$${deduction}`:'—'}</td><td><strong>$${r.total.toFixed(2)}</strong></td></tr>`).join(''):'<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:24px">No approved timesheets found for this period.</td></tr>'}</tbody></table>`;
}
async function saveCalculatedPayroll(){
  if(!calcResults.length){showToast('Nothing to save','error');return;}
  const start=document.getElementById('auto-pr-start').value;
  const end=document.getElementById('auto-pr-end').value;
  const rows=calcResults.map(r=>({agent_name:r.name,period_start:start,period_end:end,hours_worked:parseFloat(r.hours.toFixed(2)),overtime_hours:r.otHours>0?parseFloat(r.otHours.toFixed(2)):null,hourly_rate:r.rate,total_amount:parseFloat(r.total.toFixed(2)),status:'pending'}));
  await sb.from('payroll').insert(rows);
  showToast('Payroll saved for '+rows.length+' agents');
  await logActivity('Payroll calculated for period '+start+' to '+end);
}

  const results=[];
  allLeads.filter(l=>`${l.first_name} ${l.last_name} ${l.company} ${l.email}`.toLowerCase().includes(q.toLowerCase())).slice(0,4).forEach(l=>results.push({type:'Lead',text:`${l.first_name||''} ${l.last_name||''} - ${l.company||''}`,action:"go('crm',document.querySelector('.nav-item[onclick*=crm]'))"}));
  allContacts.filter(c=>`${c.first_name} ${c.last_name} ${c.email}`.toLowerCase().includes(q.toLowerCase())).slice(0,3).forEach(c=>results.push({type:'Contact',text:`${c.first_name||''} ${c.last_name||''} - ${c.email||''}`,action:"go('contacts',document.querySelector('.nav-item[onclick*=contacts]'))"}));
  currentAgents.filter(a=>`${a.first_name} ${a.last_name} ${a.email}`.toLowerCase().includes(q.toLowerCase())).slice(0,3).forEach(a=>results.push({type:'Agent',text:`${a.first_name||''} ${a.last_name||''} - ${a.role||''}`,action:"go('hr',document.querySelector('.nav-item[onclick*=\"hr\"]'))"}));
  if(!results.length){resultsEl.innerHTML='<div style="padding:16px;text-align:center;color:var(--muted);font-size:13px">No results found</div>';resultsEl.classList.add('open');return;}
  resultsEl.innerHTML=results.map(r=>`<div class="search-result-item" onclick="${r.action};document.getElementById('search-results').classList.remove('open');document.getElementById('global-search').value=''"><div class="search-result-type">${r.type}</div>${r.text}</div>`).join('');
  resultsEl.classList.add('open');
}
document.addEventListener('click',e=>{if(!e.target.closest('.global-search-wrap'))document.getElementById('search-results')?.classList.remove('open');if(!e.target.closest('.notif-bell')&&!e.target.closest('.notif-dropdown'))document.getElementById('notif-dropdown')?.classList.remove('open');});

// ======= NAVIGATION =======
function go(page,el){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  if(el)el.classList.add('active');
  document.querySelectorAll('.module-page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  currentPage=page;
  const titles={dashboard:'Dashboard',crm:'CRM & Leads',pipeline:'Pipeline',contacts:'Contacts',helpdesk:'Helpdesk',contracts:'Contracts',billing:'Billing',attendance:'Clock In / Clock Out',roster:'Roster & Shifts',leave:'Leave Management',hr:'HR & Agents',timesheets:'Timesheets',payroll:'Payroll',accounting:'Accounting',tasks:'Tasks',clients:'Client Workspaces',users:'User Management',settings:'Settings'};
  document.getElementById('page-title').textContent=titles[page]||page;
  const addPages=['crm','hr','helpdesk','contracts','billing','timesheets','payroll','accounting','tasks','users','clients'];
  document.getElementById('add-btn').style.display=addPages.includes(page)?'block':'none';
  if(page==='contracts')loadContracts();
  if(page==='timesheets')loadTimesheets();
  if(page==='payroll'){switchPayrollTab('records',document.querySelector('#page-payroll .tab'));loadPayrollRecords();}
  if(page==='accounting')loadAccounting();
  if(page==='tasks')loadTasks();
  if(page==='attendance')loadAttendancePage();
  if(page==='roster')loadRosterPage();
  if(page==='leave'){loadLeaveStats();}
  if(page==='clients'){loadClientsPage();loadClients();}
  if(page==='users')loadUsers();
  closeSidebar();
}

// ======= MOBILE SIDEBAR =======
function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('sidebar-overlay').classList.add('open');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebar-overlay').classList.remove('open');}

// ======= MODAL HELPERS =======
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function openAdd(){
  const map={crm:'lead-modal',hr:'agent-modal',helpdesk:'ticket-modal',contracts:'contract-modal',billing:'invoice-modal',timesheets:'timesheet-modal',payroll:'payroll-modal',accounting:'transaction-modal',tasks:'task-modal',users:'user-modal',clients:'client-modal'};
  const m=map[currentPage];if(m)openModal(m);
}

// ======= SAVE FUNCTIONS =======
async function saveLead(){
  const fname=document.getElementById('l-fname').value,lname=document.getElementById('l-lname').value;
  if(!fname){showToast('First name required','error');return;}
  await sb.from('leads').insert({first_name:fname,last_name:lname,company:document.getElementById('l-company').value,email:document.getElementById('l-email').value,phone:document.getElementById('l-phone').value,status:document.getElementById('l-status').value,deal_value:parseFloat(document.getElementById('l-value').value)||0,notes:document.getElementById('l-notes').value});
  closeModal('lead-modal');await loadDashboard();showToast('Lead added');await logActivity('New lead added: '+fname+' '+lname);
}
async function saveAgent(){
  const fname=document.getElementById('a-fname').value;
  if(!fname){showToast('First name required','error');return;}
  await sb.from('agents').insert({first_name:fname,last_name:document.getElementById('a-lname').value,email:document.getElementById('a-email').value,role:document.getElementById('a-role').value,department:document.getElementById('a-dept').value,hourly_rate:parseFloat(document.getElementById('a-rate').value)||8,status:document.getElementById('a-status').value,client_name:document.getElementById('a-client').value||null,start_date:document.getElementById('a-start').value});
  closeModal('agent-modal');const{data}=await sb.from('agents').select('*');loadHR(data||[]);showToast('Agent added');await logActivity('New agent added: '+fname);
}
async function saveTicket(){
  await sb.from('tickets').insert({subject:document.getElementById('t-subject').value,client_name:document.getElementById('t-client').value,client_email:document.getElementById('t-email').value,priority:document.getElementById('t-priority').value,status:document.getElementById('t-status').value,assigned_to:document.getElementById('t-assigned').value,description:document.getElementById('t-desc').value});
  closeModal('ticket-modal');const{data}=await sb.from('tickets').select('*');loadHelpdesk(data||[]);showToast('Ticket created');
}
async function saveContract(){
  await sb.from('contracts').insert({title:document.getElementById('c-title').value,client_name:document.getElementById('c-client').value,client_email:document.getElementById('c-email').value,value:parseFloat(document.getElementById('c-value').value)||0,status:document.getElementById('c-status').value,start_date:document.getElementById('c-start').value,end_date:document.getElementById('c-end').value,description:document.getElementById('c-desc').value});
  closeModal('contract-modal');loadContracts();loadClients();showToast('Contract saved');
}
async function saveInvoice(){
  await sb.from('invoices').insert({invoice_number:document.getElementById('i-num').value,client_name:document.getElementById('i-client').value,client_email:document.getElementById('i-email').value,amount:parseFloat(document.getElementById('i-amount').value)||0,status:document.getElementById('i-status').value,due_date:document.getElementById('i-due').value,notes:document.getElementById('i-notes').value});
  closeModal('invoice-modal');const{data}=await sb.from('invoices').select('*');loadBilling(data||[]);showToast('Invoice created');

async function saveTimesheet(){
  const hours=parseFloat(document.getElementById('ts-hours').value)||0;
  const ot=Math.max(0,hours-8);
  await sb.from('timesheets').insert({agent_name:document.getElementById('ts-agent').value,date:document.getElementById('ts-date').value,hours_worked:hours,overtime_hours:ot>0?ot:null,task:document.getElementById('ts-task').value,status:document.getElementById('ts-status').value});
  closeModal('timesheet-modal');loadTimesheets();showToast('Timesheet logged');
}
async function savePayroll(){
  await sb.from('payroll').insert({agent_name:document.getElementById('pr-agent').value,period_start:document.getElementById('pr-start').value,period_end:document.getElementById('pr-end').value,hours_worked:parseFloat(document.getElementById('pr-hours').value)||0,hourly_rate:parseFloat(document.getElementById('pr-rate').value)||0,total_amount:parseFloat(document.getElementById('pr-total').value)||0,status:document.getElementById('pr-status').value});
  closeModal('payroll-modal');loadPayrollRecords();showToast('Payroll record saved');
}
async function saveTransaction(){
  await sb.from('transactions').insert({type:document.getElementById('tr-type').value,category:document.getElementById('tr-category').value,description:document.getElementById('tr-desc').value,amount:parseFloat(document.getElementById('tr-amount').value)||0,date:document.getElementById('tr-date').value});
  closeModal('transaction-modal');loadAccounting();showToast('Transaction added');
}
async function saveTask(){
  const title=document.getElementById('tk-title').value;
  if(!title){showToast('Task title required','error');return;}
  await sb.from('tasks').insert({title,assigned_to:document.getElementById('tk-assign').value,due_date:document.getElementById('tk-due').value,priority:document.getElementById('tk-priority').value,status:document.getElementById('tk-status').value,notes:document.getElementById('tk-notes').value}).catch(async()=>{
    // tasks table may not exist yet, create in activity_log as fallback
    await sb.from('activity_log').insert({action:'Task: '+title,description:document.getElementById('tk-assign').value,user_email:user?.email||'system'});
  });
  closeModal('task-modal');loadTasks();showToast('Task created');

async function saveShift(){
  const agent=document.getElementById('sh-agent').value;
  const date=document.getElementById('sh-date').value;
  if(!agent||!date){showToast('Agent name and date required','error');return;}
  await sb.from('timesheets').insert({agent_name:agent,date,shift_type:document.getElementById('sh-type').value,shift_start:document.getElementById('sh-start').value,shift_end:document.getElementById('sh-end').value,client_name:document.getElementById('sh-client').value||null,task:document.getElementById('sh-notes').value||'Shift',status:'pending'});
  closeModal('shift-modal');loadRosterPage();showToast('Shift assigned');
}
async function saveUser(){
  const name=document.getElementById('u-name').value,email=document.getElementById('u-email').value;
  if(!name||!email){showToast('Name and email required','error');return;}
  await sb.from('users').insert({full_name:name,email,role:document.getElementById('u-role').value,status:document.getElementById('u-status').value});
  closeModal('user-modal');loadUsers();showToast('User added');
}
async function saveClient(){
  const name=document.getElementById('cl-name').value;
  if(!name){showToast('Client name required','error');return;}
  await sb.from('contracts').insert({title:'['+name+'] Service Agreement',client_name:name,client_email:document.getElementById('cl-email').value,value:parseFloat(document.getElementById('cl-value').value)||0,status:document.getElementById('cl-status').value,description:document.getElementById('cl-notes').value});
  closeModal('client-modal');loadClientsPage();loadClients();showToast('Client workspace created');

// ======= SETTINGS =======
async function saveSettings(){showToast('Settings saved');}
async function changePassword(){
  const np=document.getElementById('new-password').value,cp=document.getElementById('confirm-password').value;
  if(!np){showToast('Enter new password','error');return;}
  if(np!==cp){showToast('Passwords do not match','error');return;}
  const{error}=await sb.auth.updateUser({password:np});
  if(error){showToast(error.message,'error');}else{showToast('Password updated successfully');}
}

// ======= PAYROLL TABS =======
function switchPayrollTab(tab,el){document.querySelectorAll('#page-payroll .tab').forEach(t=>t.classList.remove('active'));if(el)el.classList.add('active');document.querySelectorAll('#page-payroll .tab-content').forEach(t=>t.classList.remove('active'));document.getElementById('payroll-tab-'+tab).classList.add('active');if(tab==='records')loadPayrollRecords();}

async function logout(){await sb.auth.signOut();document.getElementById('app-screen').style.display='none';document.getElementById('auth-screen').style.display='flex';}

init();
